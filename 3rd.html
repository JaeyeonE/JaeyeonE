<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>상품 소개 페이지</title>
    <style media="screen">
      @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');

    h1, p {
        text-align: center;
    }
      h1 {
        padding: 10px
        background: #aaa;
        color: rgba(70, 24, 97, 0.5);
        !important;
      }
      p {
        font-style: italic;
      }
      .accent {
        border: 1px solid #000;
        padding: 5px;
      }
      .bg {
        background-color: #ddd;
      }
      body {
        border: dotted;
        font-size: 20px;
        font-weight: bold;
        font-family: 'Gowun Dodum', sans-serif;
        }
      }
    </style>
  </head>
  <body>
    <div>
    <h1 class="accent bg">레드향</h1>
    <p style="color: blue;"">껍질에 붉은 빛이 돌아 <span class="accent"; style="color: red;""> 레드향<sub>(내가 좋아하는 과일)</sup></span>이라 불린다.</p>
    <p style="color: brown;">레드향은 한라봉과 귤을 교배한 것으로</p>
    <p style="color: deeppink;">비타민 C와 비타민 P가 풍부하다</p>
  </div>
  </body>
</html>
